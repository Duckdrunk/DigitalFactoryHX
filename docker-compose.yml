services:
  db:
    image: postgres:15-alpine
    container_name: digitalfactoryhx-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: digitalfactoryhx
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
